<!doctype html>

                <div

                    <a href="#slide2" class="btn btn-circle">❯</a>

            <div id="slide2" class="carousel-item relative w-full">

                    src="./poop/dji_fly_20260212_133012_0100_1770929082415_photo.jpg"

                />

                    class="absolute left-5 right-5 top-1/2 flex -translate-y-1/2 transform justify-between"
                >
                    <a href="#slide1" class="btn btn-circle">❮</a>
                    <a href="#slide3" class="btn btn-circle">❯</a>
                </div>
            </div>
            <div id="slide3" class="carousel-item relative w-full">

                    src="./poop/dji_fly_20260212_133628_0107_1770929053510_photo.jpg"

            <span class="text-xl select-none">Give us a fly!</span>
            <a href="tel:+19012765172" class="text-4xl font-bold select-all"

            >
        </div>

            <div class="p-4 px-8">
                <div class="hover-3d pointer-events-none">
                    <!-- content -->
                    <figure class="max-w-100 aspect-video rounded-2xl">
