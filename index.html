<!doctype html>
<html data-theme="cmyk" class="bg-base-300 overflow-hidden">

    </head>
    <body class="bg-base-300 h-screen w-screen">
        <div class="carousel w-full">
            <div id="slide1" class="carousel-item relative w-full">
                <img
                    src="./poop/3455front.jpg"
                    class="w-full h-screen object-cover blur-xs"
                />
                <div
                    class="absolute left-5 top-32 bottom-0 flex items-center right-5 justify-center z-20"
                >
                    <div class="p-4 px-8">
                        <figure class="max-w-100">
                            <img
                                alt="Mid-South Sky"
                                draggable="false"

                            />

                    </div>

            </div>
            <div id="slide2" class="carousel-item relative w-full">

                >
                    <div class="p-4 px-8">
                        <figure class="max-w-100">
                            <img
                                alt="Mid-South Sky"
                                draggable="false"
                                class="object-contain"
                                src="./poop/Just_logo.png"
                            />
                        </figure>
                    </div>
                </div>
            </div>
        </div>
        <div
            class="rotate-3 *:-rotate-3 flex flex-col bg-base/20 glass text-white text-center items-center justify-center shadow-lg fixed z-10 -bottom-20 -left-8 right-0 h-[50vh] gap-4 py-8"
        ></div>
        <div
            class="fixed left-0 right-0 text-white flex-col flex items-center justify-center z-20 top-[78vh]"
        >
            <span
                class="text-6xl font-bold tracking-wide select-none opacity-90 text-shadow-gray-400/70 text-shadow-md"
                >Give us a fly!</span
            >
            <span class="mb-8 text-3xl mt-4 font-semibold"
                >and try Mid-South Sky</span
            >
            <a href="tel:+19012765172" class="text-4xl font-bold select-all"
                >901-276-5172</a
            >
            <a class="text-2xl select-all" href="mailto:info@midsouthsky.com"
                >info@midsouthsky.com</a
            >
        </div>
        <div class="fixed flex items-center left-0 right-0 top-[70vh] z-20">
            <div class="flex w-full justify-center gap-2 py-2">
                <a href="#slide1" class="btn btn-xs">1</a>
                <a href="#slide2" class="btn btn-xs">2</a>
            </div>
