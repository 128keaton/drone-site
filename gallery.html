                    <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">

                            >

                                        src="./fatdanny/DJI_20250628124031_0040_D.jpg"

                                        decoding="async"
                                        class="transition-transform duration-300 group-hover:scale-[1.02] cursor-pointer"
                                    />

                            </div>
                        </div>
                        <div class="card bg-base-100 shadow-xl">
                            <button

                                data-src="./fatdanny/dji_fly_20260212_133012_0100_1770929082415_photo.jpg"
                                type="button"
                            >
                                <figure class="overflow-hidden">
                                    <img
                                        src="./fatdanny/dji_fly_20260212_133012_0100_1770929082415_photo.jpg"
                                        alt="Drone detail"
                                        loading="lazy"
                                        decoding="async"

                        </div>
                        <div class="card bg-base-100 shadow-xl">
                            <button

                                data-src="./fatdanny/dji_fly_20260212_133320_0103_1770929054804_photo.jpg"

                            >
                                <figure class="overflow-hidden">
                                    <img
                                        src="./fatdanny/dji_fly_20260212_133320_0103_1770929054804_photo.jpg"

                                        loading="lazy"
                                        decoding="async"
                                        class="transition-transform duration-300 group-hover:scale-[1.02] cursor-pointer"
                                    />
                                </figure>
                            </button>
                            <div class="card-body">
                                <h2 class="card-title">Property Overview</h2>
                            </div>
                        </div>
                        <div class="card bg-base-100 shadow-xl">
                            <button

                                <figure class="overflow-hidden">
                                    <img

                                        alt="Wide aerial"
                                        loading="lazy"
                                        decoding="async"
                                        class="transition-transform duration-300 group-hover:scale-[1.02] cursor-pointer"
                                    />
                                </figure>
                            </button>
                            <div class="card-body">
                                <h2 class="card-title">Wide Aerial</h2>
                            </div>
                        </div>
                        <div class="card bg-base-100 shadow-xl">
                            <button
                                class="focus:outline-none group gallery-item"
                                data-title="Landscape"
                                data-src="./fatdanny/dji_fly_20260212_191232_0114_1771003117613_photo.jpg"
                                type="button"
                            >
                                <figure class="overflow-hidden">
                                    <img
                                        src="./fatdanny/dji_fly_20260212_191232_0114_1771003117613_photo.jpg"
                                        alt="Aerial landscape"
                                        loading="lazy"
                                        decoding="async"
                                        class="transition-transform duration-300 group-hover:scale-[1.02] cursor-pointer"
                                    />
                                </figure>
                            </button>
                            <div class="card-body">
                                <h2 class="card-title">Landscape</h2>
                            </div>
                        </div>
                        <div class="card bg-base-100 shadow-xl">
                            <button
                                class="focus:outline-none group gallery-item"
                                data-title="Twilight Flight"
                                data-src="./fatdanny/dji_fly_20260212_191454_0117_1771003109184_photo.jpg"
                                type="button"
                            >
                                <figure class="overflow-hidden">
                                    <img
                                        src="./fatdanny/dji_fly_20260212_191454_0117_1771003109184_photo.jpg"
                                        alt="Twilight flight"
                                        loading="lazy"
                                        decoding="async"
                                        class="transition-transform duration-300 group-hover:scale-[1.02] cursor-pointer"
                                    />
                                </figure>
                            </button>
                            <div class="card-body">

                        </div>
                        <div class="card bg-base-100 shadow-xl">
                            <button
                                class="focus:outline-none group gallery-item"

                                data-src="./fatdanny/dji_fly_20260212_191540_0120_1771003103223_photo.jpg"
                                type="button"
                            >
                                <figure class="overflow-hidden">
                                    <img
                                        src="./fatdanny/dji_fly_20260212_191540_0120_1771003103223_photo.jpg"
                                        alt="Drone detail"
                                        loading="lazy"
                                        decoding="async"
                                        class="transition-transform duration-300 group-hover:scale-[1.02] cursor-pointer"
                                    />
                                </figure>
                            </button>
                            <div class="card-body">
                                <h2 class="card-title">Drone Detail</h2>
                            </div>
                        </div>
                        <div class="card bg-base-100 shadow-xl">
                            <button
                                class="focus:outline-none group gallery-item"
                                data-title="Wide Aerial"
                                data-src="./fatdanny/dji_fly_20260212_191712_0122_1771003099490_photo.jpg"
                                type="button"
                            >
                                <figure class="overflow-hidden">
                                    <img
                                        src="./fatdanny/dji_fly_20260212_191712_0122_1771003099490_photo.jpg"
                                        alt="Wide aerial"
                                        loading="lazy"

                                        class="transition-transform duration-300 group-hover:scale-[1.02] cursor-pointer"
                                    />

                            <div class="card-body">

                            </div>
                        </div>
                    </div>

                    <dialog id="gallery-modal" class="modal">
                        <div class="modal-box max-w-5xl">
                            <h3 id="gallery-modal-title" class="font-bold text-lg"></h3>
                            <img
                                id="gallery-modal-image"
                                src=""
                                alt=""
                                class="mt-4 w-full h-auto"
                            />
                            <div class="modal-action">
                                <form method="dialog">
                                    <button class="btn">Close</button>
                                </form>
                            </div>
                        </div>
                    </dialog>

                    <script>
                        const modal = document.getElementById("gallery-modal");
                        const modalTitle = document.getElementById("gallery-modal-title");
                        const modalImage = document.getElementById("gallery-modal-image");
                        document.querySelectorAll(".gallery-item").forEach((button) => {
                            button.addEventListener("click", () => {
                                const src = button.getAttribute("data-src");
                                const title = button.getAttribute("data-title");
                                if (modalTitle) modalTitle.textContent = title ?? "";
                                if (modalImage) {
                                    modalImage.src = src ?? "";
                                    modalImage.alt = title ?? "";
                                }
                                modal?.showModal();
                            });
                        });
                    </script>
                </div>
            </section>
        </main>
    </body>
</html>
