<!doctype html>
<html lang="en" data-theme="midsouth" class="bg-base-300 scroll-smooth">
    <head>
        <title>Gallery | Mid-South Sky</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="./styles.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
    </head>
    <body class="bg-base-300 min-h-screen overflow-x-hidden m-0 p-0">
        <!-- Main content with bottom padding on mobile -->
        <main class="min-h-screen pb-20 lg:pb-0">
            <section class="hero min-h-fit bg-base-200">
                <div class="hero-content text-center">
                    <div class="max-w-3xl">
                        <div class="flex justify-center mb-6">
                            <img
                                src="./asset/logo_tre3.png"
                                alt="Mid-South Sky"
                                class="w-full max-w-2xl"
                            />
                        </div>
                        <div
                            class="mt-6 mb-4 card bg-base-100/95 border border-base-content/20 shadow-2xl rounded-none"
                        >
                            <div class="card-body px-8 py-6">
                                <div
                                    class="text-xs uppercase tracking-[0.35em] text-base-content/60"
                                >
                                    Contact
                                </div>
                                <div
                                    class="mt-2 h-px w-full bg-base-content/20"
                                ></div>
                                <div
                                    class="mt-4 grid gap-4 sm:grid-cols-2 sm:gap-8 text-left"
                                >
                                    <div>
                                        <div
                                            class="text-[11px] uppercase tracking-[0.25em] text-base-content/60 text-center"
                                        >
                                            Call
                                        </div>
                                        <a
                                            href="tel:+9012865172"
                                            class="mt-2 block text-2xl font-semibold text-primary text-center"
                                        >
                                            901-286-5172
                                        </a>
                                    </div>
                                    <div>
                                        <div
                                            class="text-[11px] uppercase tracking-[0.25em] text-base-content/60 text-center"
                                        >
                                            Email
                                        </div>
                                        <a
                                            href="mailto:info@midsouthsky.com"
                                            class="mt-2 block text-xl font-semibold text-secondary text-center"
                                        >
                                            info@midsouthsky.com
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <a href="./" class="link"> Home </a>
                    </div>
                </div>
            </section>

            <!-- Content wrapper with sticky nav -->
            <div class="flex lg:gap-0 lg:relative">
                <!-- Desktop Side Navigation (Sticky) -->
                <nav
                    class="hidden lg:sticky lg:top-4 lg:flex lg:flex-col lg:w-64 lg:h-fit lg:bg-base-100 lg:border lg:border-base-content/20 lg:p-6 lg:gap-4 lg:z-30 lg:shrink-0 lg:self-start lg:m-4 lg:ml-6 lg:rounded-lg"
                >
                    <ul class="flex flex-col gap-2">
                        <!-- GALLERY_NAV_START -->
                        <!-- GALLERY_NAV_END -->
                    </ul>
                </nav>

                <!-- Sections container -->
                <div class="flex-1 w-full">
                    <!-- GALLERY_SECTIONS_START -->
                    <!-- GALLERY_SECTIONS_END -->
                </div>
            </div>

            <!-- Mobile Bottom Navigation -->
            <nav
                class="fixed lg:hidden bottom-0 left-0 right-0 bg-base-100 border-t border-base-content/10 z-40"
            >
                <div class="flex gap-1 p-2 justify-start">
                    <!-- GALLERY_MOBILE_NAV_START -->
                    <!-- GALLERY_MOBILE_NAV_END -->
                </div>
            </nav>

            <!-- Gallery Modal -->
            <dialog id="gallery-modal" class="modal">
                <div class="modal-box max-w-6xl">
                    <h3 id="gallery-modal-title" class="font-bold text-lg"></h3>

                    <div class="relative mt-4">
                        <button
                            id="gallery-prev"
                            type="button"
                            class="btn btn-circle btn-ghost absolute left-2 top-1/2 -translate-y-1/2 z-10"
                            aria-label="Previous image"
                        >
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                class="h-5 w-5"
                            >
                                <title>Previous image</title>
                                <path d="M15 18l-6-6 6-6" />
                            </svg>
                        </button>

                        <div
                            id="gallery-modal-image-wrap"
                            class="w-full overflow-hidden"
                        ></div>

                        <button
                            id="gallery-next"
                            type="button"
                            class="btn btn-circle btn-ghost absolute right-2 top-1/2 -translate-y-1/2 z-10"
                            aria-label="Next image"
                        >
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                class="h-5 w-5"
                            >
                                <title>Next image</title>
                                <path d="M9 18l6-6-6-6" />
                            </svg>
                        </button>
                    </div>

                    <div class="modal-action">
                        <form method="dialog">
                            <button type="button" class="btn">Close</button>
                        </form>
                    </div>
                </div>
            </dialog>
        </main>

        <script>
            const modal = document.getElementById("gallery-modal");
            const modalTitle = document.getElementById("gallery-modal-title");
            const modalImageWrap = document.getElementById(
                "gallery-modal-image-wrap",
            );
            const prevButton = document.getElementById("gallery-prev");
            const nextButton = document.getElementById("gallery-next");
            const items = Array.from(
                document.querySelectorAll(".gallery-item"),
            );
            let currentIndex = 0;
            let startX = 0;
            let isPointerDown = false;

            const openAt = (index) => {
                if (items.length === 0) return;
                currentIndex = (index + items.length) % items.length;
                const button = items[currentIndex];
                const img = button.querySelector("img");
                const alt = img?.alt ?? "";

                if (modalTitle) modalTitle.textContent = alt;

                if (modalImageWrap) {
                    modalImageWrap.innerHTML = "";
                    if (img) {
                        const clone = img.cloneNode(true);
                        clone.removeAttribute("loading");
                        clone.removeAttribute("decoding");
                        clone.classList.remove("cursor-pointer");
                        clone.classList.add("w-full", "h-auto");
                        modalImageWrap.appendChild(clone);
                    }
                }

                modal?.showModal();
            };

            items.forEach((button, index) => {
                button.addEventListener("click", () => openAt(index));
            });

            prevButton?.addEventListener("click", () =>
                openAt(currentIndex - 1),
            );
            nextButton?.addEventListener("click", () =>
                openAt(currentIndex + 1),
            );

            document.addEventListener("keydown", (event) => {
                if (!modal?.open) return;
                if (event.key === "ArrowLeft") openAt(currentIndex - 1);
                if (event.key === "ArrowRight") openAt(currentIndex + 1);
            });

            if (modalImageWrap) {
                modalImageWrap.addEventListener("pointerdown", (event) => {
                    isPointerDown = true;
                    startX = event.clientX;
                });

                modalImageWrap.addEventListener("pointerup", (event) => {
                    if (!isPointerDown) return;
                    const deltaX = event.clientX - startX;
                    isPointerDown = false;
                    if (Math.abs(deltaX) < 40) return;
                    if (deltaX > 0) {
                        openAt(currentIndex - 1);
                    } else {
                        openAt(currentIndex + 1);
                    }
                });

                modalImageWrap.addEventListener("pointerleave", () => {
                    isPointerDown = false;
                });

                modalImageWrap.addEventListener("pointercancel", () => {
                    isPointerDown = false;
                });
            }

            // Navigation highlighting
            const navLinks = document.querySelectorAll('a[href^="#"]');
            const sections = document.querySelectorAll(
                '[id^="real-estate"], [id^="general"], [id^="night-time"], [id^="cinematography"]',
            );

            function updateActiveNav() {
                let current = "";

                sections.forEach((section) => {
                    const sectionTop = section.offsetTop;

                    if (pageYOffset >= sectionTop - 200) {
                        current = section.getAttribute("id");
                    }
                });

                navLinks.forEach((link) => {
                    link.classList.remove("font-bold", "text-primary");
                    if (link.getAttribute("href") === `#${current}`) {
                        link.classList.add("font-bold", "text-primary");
                    }
                });
            }

            window.addEventListener("scroll", updateActiveNav);
            updateActiveNav();
        </script>
    </body>
</html>
