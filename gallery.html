                    <dialog id="gallery-modal" class="modal">
                        <div class="modal-box max-w-6xl">
                            <h3 id="gallery-modal-title" class="font-bold text-lg"></h3>

                            <div class="relative mt-4">
                                <button
                                    id="gallery-prev"
                                    type="button"
                                    class="btn btn-circle btn-ghost absolute left-2 top-1/2 -translate-y-1/2 z-10"
                                    aria-label="Previous image"
                                >
                                    <svg
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        class="h-5 w-5"
                                    >
                                        <path d="M15 18l-6-6 6-6" />
                                    </svg>
                                </button>

                                <div id="gallery-modal-image-wrap" class="w-full overflow-hidden"></div>

                                <button
                                    id="gallery-next"
                                    type="button"
                                    class="btn btn-circle btn-ghost absolute right-2 top-1/2 -translate-y-1/2 z-10"
                                    aria-label="Next image"
                                >
                                    <svg
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        class="h-5 w-5"
                                    >
                                        <path d="M9 18l6-6-6-6" />
                                    </svg>
                                </button>
                            </div>

                            <div class="modal-action">
                                <form method="dialog">
                                    <button class="btn">Close</button>
                                </form>
                            </div>
                        </div>
                    </dialog>
                </div>
            </section>
        </main>

        <script>
            const modal = document.getElementById("gallery-modal");
            const modalTitle = document.getElementById("gallery-modal-title");
            const modalImageWrap = document.getElementById("gallery-modal-image-wrap");
            const prevButton = document.getElementById("gallery-prev");
            const nextButton = document.getElementById("gallery-next");
            const items = Array.from(document.querySelectorAll(".gallery-item"));
            let currentIndex = 0;
            let startX = 0;
            let isPointerDown = false;

            const openAt = (index) => {
                if (items.length === 0) return;
                currentIndex = (index + items.length) % items.length;
                const button = items[currentIndex];
                const card = button.closest(".card");
                const title = card?.querySelector(".card-title")?.textContent ?? "";
                const img = button.querySelector("img");

                if (modalTitle) modalTitle.textContent = title;

                if (modalImageWrap) {
                    modalImageWrap.innerHTML = "";
                    if (img) {
                        const clone = img.cloneNode(true);
                        clone.removeAttribute("loading");
                        clone.removeAttribute("decoding");
                        clone.classList.remove("cursor-pointer");
                        clone.classList.add("w-full", "h-auto");
                        modalImageWrap.appendChild(clone);
                    }
                }

                modal?.showModal();
            };

            items.forEach((button, index) => {
                button.addEventListener("click", () => openAt(index));
            });

            prevButton?.addEventListener("click", () => openAt(currentIndex - 1));
            nextButton?.addEventListener("click", () => openAt(currentIndex + 1));

            document.addEventListener("keydown", (event) => {
                if (!modal?.open) return;
                if (event.key === "ArrowLeft") openAt(currentIndex - 1);
                if (event.key === "ArrowRight") openAt(currentIndex + 1);
            });

            if (modalImageWrap) {
                modalImageWrap.addEventListener("pointerdown", (event) => {
                    isPointerDown = true;
                    startX = event.clientX;
                });

                modalImageWrap.addEventListener("pointerup", (event) => {
                    if (!isPointerDown) return;
                    const deltaX = event.clientX - startX;
                    isPointerDown = false;
                    if (Math.abs(deltaX) < 40) return;
                    if (deltaX > 0) {
                        openAt(currentIndex - 1);
                    } else {
                        openAt(currentIndex + 1);
                    }
                });

                modalImageWrap.addEventListener("pointerleave", () => {
                    isPointerDown = false;
                });

                modalImageWrap.addEventListener("pointercancel", () => {
                    isPointerDown = false;
                });
            }
        </script>
    </body>
